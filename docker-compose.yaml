services:
  kafka:
    image: confluentinc/cp-kafka:8.2.2
    container_name: kafka-container
    ports:
      - "9092:9092"
    environment:
      KAFKA_KRAFT_MODE: "true"  # Use Kraft to handle metadata, no need for Zookeeper.
      CLUSTER_ID: '1kahd6lkad-WgsT73-66FvaR'
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker, controller  # The node defined as both broker and controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093  # Brokers that serve as Controller and can decide on cluster decisions.
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1  # One copy of metadata for consumed data. No replica or copy. In production, should be higher.
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092, CONTROLLER://0.0.0.0:9093  # Controller and client doors for connectivity
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    volumes:
      - kafka_kraft:/var/lib/kafka/data

volumes:
  kafka_kraft:
